{% extends "base.html" %}
{% block title %}投入一个瓶子 · 静屿{% endblock %}

{% block content %}
<div class="page-header fade-in">
  <h1 class="page-header__title">写一封，给未来的自己</h1>
  <p class="page-header__subtitle">折成纸，扔进海里</p>
</div>

<input type="hidden" id="encryption-salt" value="{{ encryption_salt }}">
<input type="hidden" id="user-nickname" value="{{ current_user.nickname }}">

<div class="paper fade-in" id="paper">
  <div class="paper__fold paper__fold--tl"></div>
  <div class="paper__fold paper__fold--br"></div>
  <textarea class="paper__textarea" id="diary-editor" placeholder="今天…  想到了…  心里有点…  想说…  也可以贴任何 emoji 🌸"></textarea>
</div>

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
  <div id="char-counter" style="font-size:13px;color:var(--color-text-muted);">0 / 5000</div>
  <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--color-text-secondary);cursor:pointer;">
    <input type="checkbox" id="is-public">
    <span>允许被陌生人拾起</span>
  </label>
</div>

<!-- 投瓶动效区 -->
<div id="bottle-wrap">
  <div class="bottle-stage">
    <div class="water-surface"></div>
    <div class="bottle">🍾</div>
    <div class="splash">
      <div class="splash__drop"></div>
      <div class="splash__drop"></div>
      <div class="splash__drop"></div>
      <div class="splash__drop"></div>
      <div class="splash__drop"></div>
      <div class="splash__drop"></div>
      <div class="splash__drop"></div>
    </div>
  </div>
  <div style="text-align:center;">
    <button class="btn btn--primary btn--lg" id="throw-bottle">投入大海</button>
  </div>
</div>

<div id="throw-result" style="display:none;"></div>
{% endblock %}

{% block extra_js %}
<script defer src="/static/js/pages/diary.js"></script>
{% endblock %}
